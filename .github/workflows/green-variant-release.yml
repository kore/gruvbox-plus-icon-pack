# Publish a NixOS pin for the Gruvbox-Plus-Green variant for a tag.
#
# The point: the Nix `fetchFromGitHub` hash is computed *by this workflow*, on
# the tag, so you never compute or paste a hash by hand.
#
# Your release loop (locally):
#   git fetch upstream && git merge upstream/master   # pull upstream, review
#   python3 scripts/recolor-green                      # regenerate the variant
#   git add Gruvbox-Plus-Green && git commit -m "regenerate green variant"
#   git tag v0.0.2 && git push && git push --tags      # <-- triggers this workflow
#
# Or run it manually (Actions -> this workflow -> Run workflow) against an
# existing tag. CI verifies the committed variant is in sync with the script,
# computes the fetchFromGitHub hash for the tag, and creates a GitHub Release
# whose body is a ready-to-paste derivation (version + hash) for your nixos.nix.
#
# Tags must be v-prefixed (v0.0.2, v2026.07.14, ...) to match the nix `rev`.

name: green-variant-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v-prefixed tag to release (e.g. v0.0.2)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: v
        run: |
          TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.v.outputs.tag }}
          fetch-depth: 0

      - name: Verify the committed variant is in sync with the script
        run: |
          python3 scripts/recolor-green "$PWD/Gruvbox-Plus-Dark" /tmp/green-check
          # Compare recolored SVGs only (ignore the copied binary icon cache).
          if ! diff -qr --exclude=icon-theme.cache Gruvbox-Plus-Green /tmp/green-check >/dev/null; then
            echo "::error::Gruvbox-Plus-Green is out of date. Run 'python3 scripts/recolor-green', commit, and re-tag."
            diff -qr --exclude=icon-theme.cache Gruvbox-Plus-Green /tmp/green-check | head -20
            exit 1
          fi
          echo "Committed variant matches scripts/recolor-green output."

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Compute fetchFromGitHub hash for the tag
        id: hash
        run: |
          JSON="$(nix run nixpkgs#nix-prefetch-github -- \
                    "${{ github.repository_owner }}" "${{ github.event.repository.name }}" \
                    --rev "${{ steps.v.outputs.tag }}")"
          HASH="$(echo "$JSON" | jq -r '.hash // empty')"
          if [ -z "$HASH" ]; then
            SHA="$(echo "$JSON" | jq -r '.sha256')"
            HASH="$(nix hash convert --hash-algo sha256 --to sri "$SHA")"
          fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Computed $HASH"

      - name: Publish release with a ready-to-paste pin
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.v.outputs.tag }}"
          VERSION="${{ steps.v.outputs.version }}"
          HASH="${{ steps.hash.outputs.hash }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          cat > notes.md <<EOF
          Gruvbox Plus Green \`$TAG\`.

          Paste into your NixOS config (channel-based), mirroring your existing derivations:

          \`\`\`nix
          gruvbox-plus-green = pkgs.stdenvNoCC.mkDerivation {
            pname = "gruvbox-plus-green-icons";
            version = "$VERSION";
            src = pkgs.fetchFromGitHub {
              owner = "$OWNER";
              repo  = "$REPO";
              rev   = "$TAG";
              hash  = "$HASH";
            };
            dontConfigure = true; dontBuild = true;
            installPhase = ''
              mkdir -p \$out/share/icons
              cp -r Gruvbox-Plus-Green \$out/share/icons/Gruvbox-Plus-Green
            '';
          };
          \`\`\`

          Then add \`gruvbox-plus-green\` to \`environment.systemPackages\` and select
          "Gruvbox Plus Green" in GNOME Tweaks.
          EOF
          gh release create "$TAG" --title "Gruvbox Plus Green $TAG" --notes-file notes.md

      - name: Job summary
        run: |
          {
            echo "### Released ${{ steps.v.outputs.tag }}"
            echo '```nix'
            echo 'rev  = "${{ steps.v.outputs.tag }}";'
            echo 'hash = "${{ steps.hash.outputs.hash }}";'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
